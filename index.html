<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>quranvoice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #081315, #102427, #0b1719);
      color: #f4f1df;
      text-align: center;
    }

    header {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.2);
      position: sticky;
      top: 0;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .menu-container {
      position: relative;
      text-align: left;
    }

    .menu-button {
      background: #c79a2b;
      color: #111;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }

    .dropdown {
      display: none;
      position: absolute;
      top: 48px;
      left: 0;
      background: #102427;
      border-radius: 14px;
      min-width: 180px;
      overflow: hidden;
    }

    .dropdown a {
      display: block;
      padding: 14px;
      color: white;
      text-decoration: none;
    }

    .dropdown a:hover {
      background: rgba(255,255,255,0.1);
    }

    .logo {
      width: 160px;
    }

    section {
      padding: 80px 20px;
    }

    h1, h2 {
      color: #f2d17b;
    }

    .audio-box, .video-box, .mushaf-box {
      margin-top: 30px;
      padding: 20px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
    }

    video, audio {
      width: 100%;
      border-radius: 12px;
    }

    .socials a {
      font-size: 26px;
      margin: 10px;
      color: #f2d17b;
      text-decoration: none;
    }

    .socials a:hover {
      color: white;
    }

    footer {
      padding: 30px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>

<header>
  <div class="menu-container">
    <button class="menu-button" onclick="toggleMenu()">Menü</button>
    <div class="dropdown" id="menu">
      <a href="#quran">Quran</a>
      <a href="#hadeeth">Hadeeth</a>
      <a href="#audio">Audio</a>
      <a href="#articles">Articles</a>
      <a href="#video">Video</a>
    </div>
  </div>

  <img src="logo.png" class="logo">

</header>

<section>
  <h1>Willkommen bei quranvoice</h1>
  <p>Höre Quran in einer ruhigen und schönen Umgebung.</p>
</section>

<section id="quran">
  <h2>Quran</h2>
  <div class="mushaf-box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2c/Quran_Surah_1_Al-Fatiha.png" style="width:100%;">
  </div>
</section>

<section id="hadeeth">
  <h2>Hadeeth</h2>
  <p>Hier kannst du Inhalte hinzufügen.</p>
</section>

<section id="audio">
  <h2>Audio</h2>
  <div class="audio-box">
    <audio controls>
      <source src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/001.mp3">
    </audio>
  </div>
</section>

<section id="video">
  <h2>Video</h2>
  <div class="video-box">
    <video controls>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>
</section>

<section id="articles">
  <h2>Articles</h2>
  <p>Artikel folgen später.</p>
</section>

<footer>

  <div class="socials">
    <a href="https://www.facebook.com/share/1FkYHa5KYs/" target="_blank">📘</a>
    <a href="https://youtube.com/@quranvoice-i7d?si=1ONBC52pN-yGPPs6" target="_blank">▶️</a>
    <a href="https://www.instagram.com/quranvoice63?igsh=YW9lZmlqOTAxYXZk&utm_source=ig_contact_invite" target="_blank">📸</a>
    <a href="https://www.tiktok.com/@quranvoice296?_r=1&_t=ZG-95XKJuhrETR" target="_blank">🎵</a>
  </div>

  <p>© 2026 quranvoice</p>

</footer>

<script>
function toggleMenu() {
  var m = document.getElementById("menu");
  m.style.display = m.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
