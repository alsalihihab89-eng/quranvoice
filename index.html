<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>quranvoice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #ffffff;
      color: #111;
      text-align: center;
    }
    header {
      padding: 20px;
      border-bottom: 1px solid #eee;
      font-size: 24px;
      font-weight: bold;
    }
    section {
      padding: 60px 20px;
    }
    .box {
      max-width: 600px;
      margin: auto;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #111;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<header>quranvoice</header>

<section>
  <div class="box">
    <h1>Willkommen bei quranvoice</h1>
    <p>Einfache und ruhige Webseite für Quran Inhalte.</p>
    <a href="#kontakt" class="btn">Mehr erfahren</a>
  </div>
</section>

<section>
  <div class="box">
    <h2>Inhalte</h2>
    <p>Quran Rezitationen, klare Struktur und einfache Nutzung.</p>
  </div>
</section>

<section id="kontakt">
  <div class="box">
    <h2>Kontakt</h2>
    <p>info@quranvoice.com</p>
  </div>
</section>

</body>
</html>
