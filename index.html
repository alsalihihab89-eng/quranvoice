<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>quranvoice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #081315, #102427, #0b1719);
      color: #f4f1df;
      text-align: center;
    }

    header {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.2);
      position: sticky;
      top: 0;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .menu-container { position: relative; }

    .menu-button {
      background: #c79a2b;
      border: none;
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
    }

    .dropdown {
      display: none;
      position: absolute;
      top: 48px;
      background: #102427;
      border-radius: 10px;
    }

    .dropdown a {
      display: block;
      padding: 10px;
      color: white;
      text-decoration: none;
    }

    .logo { width: 150px; }

    .lang-btn {
      background: #c79a2b;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: bold;
    }

    section { padding: 60px 20px; }

    .audio-box, .video-box, .mushaf-box {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
    }

    video, audio { width: 100%; }

    footer { padding: 30px; }
  </style>
</head>

<body>

<header>
  <div class="menu-container">
    <button class="menu-button" onclick="toggleMenu()">☰</button>
    <div class="dropdown" id="menu">
      <a href="#quran">Quran</a>
      <a href="#hadeeth">Hadeeth</a>
      <a href="#audio">Audio</a>
      <a href="#articles">Articles</a>
      <a href="#video">Video</a>
    </div>
  </div>

  <img src="logo.png" class="logo">

  <button class="lang-btn" onclick="switchLang()">EN</button>
</header>

<section>
  <h1 id="title">Willkommen bei quranvoice</h1>
  <p id="desc">Höre Quran in einer ruhigen Umgebung.</p>
</section>

<section id="quran">
  <h2 id="quranTitle">Quran</h2>
  <div class="mushaf-box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2c/Quran_Surah_1_Al-Fatiha.png" style="width:100%;">
  </div>
</section>

<section id="hadeeth">
  <h2 id="hadithTitle">Hadeeth</h2>
  <p id="hadithText">Hier kannst du Inhalte hinzufügen.</p>
</section>

<section id="audio">
  <h2>Audio</h2>
  <div class="audio-box">
    <audio controls>
      <source src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/001.mp3">
    </audio>
  </div>
</section>

<section id="video">
  <h2>Video</h2>
  <div class="video-box">
    <video controls>
      <source src="video.mp4">
    </video>
  </div>
</section>

<section id="articles">
  <h2 id="articleTitle">Articles</h2>
  <p id="articleText">Artikel folgen später.</p>
</section>

<footer>
  <p>© 2026 quranvoice</p>
</footer>

<script>
let lang = "de";

function toggleMenu() {
  let m = document.getElementById("menu");
  m.style.display = m.style.display === "block" ? "none" : "block";
}

function switchLang() {
  if (lang === "de") {
    lang = "en";

    document.getElementById("title").innerText = "Welcome to quranvoice";
    document.getElementById("desc").innerText = "Listen to Quran in a peaceful environment.";
    document.getElementById("quranTitle").innerText = "Quran";
    document.getElementById("hadithTitle").innerText = "Hadith";
    document.getElementById("hadithText").innerText = "You can add content here.";
    document.getElementById("articleTitle").innerText = "Articles";
    document.getElementById("articleText").innerText = "Articles coming soon.";

  } else {
    lang = "de";

    document.getElementById("title").innerText = "Willkommen bei quranvoice";
    document.getElementById("desc").innerText = "Höre Quran in einer ruhigen Umgebung.";
    document.getElementById("quranTitle").innerText = "Quran";
    document.getElementById("hadithTitle").innerText = "Hadeeth";
    document.getElementById("hadithText").innerText = "Hier kannst du Inhalte hinzufügen.";
    document.getElementById("articleTitle").innerText = "Articles";
    document.getElementById("articleText").innerText = "Artikel folgen später.";
  }
}
</script>

</body>
</html>
