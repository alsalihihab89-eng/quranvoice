<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>quranvoice</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #081315, #102427, #0b1719);
  color: #f4f1df;
  text-align: center;
}

header {
  padding: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.2);
}

.logo { width: 140px; }

.menu-button, .lang-btn {
  background: #c79a2b;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
}

.dropdown {
  display: none;
  position: absolute;
  background: #102427;
}

.dropdown a {
  display: block;
  padding: 10px;
  color: white;
  text-decoration: none;
}

section { padding: 50px 20px; }

.hadith-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 15px;
  margin-top: 20px;
}

.hadith-card {
  padding: 20px;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  cursor: pointer;
}

.hadith-card:hover {
  background: rgba(255,255,255,0.15);
}

.audio-box, .video-box, .mushaf-box {
  margin-top: 20px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}

video, audio { width: 100%; }

.arabic { direction: rtl; }

footer { padding: 20px; }
</style>
</head>

<body>

<header>
<button onclick="toggleMenu()" class="menu-button">☰</button>

<img src="logo.png" class="logo">

<button onclick="switchLang()" class="lang-btn">🌐</button>

<div class="dropdown" id="menu">
<a href="#quran">Quran</a>
<a href="#hadeeth">Hadeeth</a>
<a href="#audio">Audio</a>
<a href="#video">Video</a>
</div>
</header>

<section>
<h1 id="title">Willkommen bei quranvoice</h1>
<p id="desc">Höre Quran in einer ruhigen Umgebung.</p>
</section>

<section id="quran">
<h2 id="quranTitle">Quran</h2>
<div class="mushaf-box">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/2c/Quran_Surah_1_Al-Fatiha.png" style="width:100%;">
</div>
</section>

<section id="hadeeth">
<h2 id="hadithTitle">Hadeeth</h2>

<div class="hadith-grid">
<div class="hadith-card" onclick="openBook('bukhari')">Sahih Bukhari</div>
<div class="hadith-card" onclick="openBook('muslim')">Sahih Muslim</div>
<div class="hadith-card" onclick="openBook('tirmidhi')">Tirmidhi</div>
<div class="hadith-card" onclick="openBook('nasai')">An-Nasa’i</div>
<div class="hadith-card" onclick="openBook('abudawud')">Abu Dawud</div>
<div class="hadith-card" onclick="openBook('ibnmajah')">Ibn Majah</div>
</div>

</section>

<section id="audio">
<h2>Audio</h2>
<div class="audio-box">
<audio controls>
<source src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/001.mp3">
</audio>
</div>
</section>

<section id="video">
<h2>Video</h2>
<div class="video-box">
<video controls>
<source src="video.mp4">
</video>
</div>
</section>

<footer>
<p>© 2026 quranvoice</p>
</footer>

<!-- Popup -->
<div id="popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black;">
<div style="background:#102427; margin:50px auto; padding:20px; width:90%; max-width:700px;">
<button onclick="closeBook()">X</button>
<h2 id="bookTitle"></h2>
<p id="bookText"></p>
</div>
</div>

<script>

let lang="de";

function toggleMenu(){
let m=document.getElementById("menu");
m.style.display=m.style.display==="block"?"none":"block";
}

function switchLang(){

if(lang==="de"){
lang="en";
document.getElementById("title").innerText="Welcome to quranvoice";
document.getElementById("desc").innerText="Listen to Quran peacefully";
document.getElementById("hadithTitle").innerText="Hadith";

}else if(lang==="en"){
lang="ar";
document.body.classList.add("arabic");
document.getElementById("title").innerText="مرحبا بكم";
document.getElementById("desc").innerText="استمع للقرآن";
document.getElementById("hadithTitle").innerText="الحديث";

}else{
lang="de";
document.body.classList.remove("arabic");
document.getElementById("title").innerText="Willkommen bei quranvoice";
document.getElementById("desc").innerText="Höre Quran in einer ruhigen Umgebung.";
document.getElementById("hadithTitle").innerText="Hadeeth";
}
}

function openBook(book){

let text="";

if(book==="bukhari") text="Sahih Bukhari Inhalte...";
if(book==="muslim") text="Sahih Muslim Inhalte...";
if(book==="tirmidhi") text="Tirmidhi Inhalte...";
if(book==="nasai") text="Nasa’i Inhalte...";
if(book==="abudawud") text="Abu Dawud Inhalte...";
if(book==="ibnmajah") text="Ibn Majah Inhalte...";

document.getElementById("bookTitle").innerText=book;
document.getElementById("bookText").innerText=text;
document.getElementById("popup").style.display="block";
}

function closeBook(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
